<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CS419 Security Project{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --text: #e8eaf6;
      --muted: #7b83a6;
      --danger: #e05c6a;
      --success: #4caf7d;
      --radius: 10px;
      --font: 'DM Sans', 'Segoe UI', sans-serif;
      --mono: 'DM Mono', 'Fira Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    .nav-brand span { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { color: var(--muted); font-size: 0.85rem; }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .container-sm { max-width: 440px; margin: 0 auto; padding: 3rem 1.5rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
    }
    .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block; font-size: 0.85rem;
      color: var(--muted); margin-bottom: 0.35rem; font-weight: 500;
    }
    input[type=text], input[type=email], input[type=password], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      font-family: var(--font);
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border-radius: 7px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: var(--font);
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.82rem; }
    .btn-full { width: 100%; }

    .alert {
      padding: 0.75rem 1rem; border-radius: 7px;
      font-size: 0.9rem; margin-bottom: 1rem;
    }
    .alert-error   { background: #2e1520; color: var(--danger); border: 1px solid #4a1e2a; }
    .alert-success { background: #122e1f; color: var(--success); border: 1px solid #1a4530; }

    .flashes { margin-bottom: 1.25rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead th {
      text-align: left; padding: 0.6rem 0.85rem;
      color: var(--muted); font-weight: 500; font-size: 0.82rem;
      border-bottom: 1px solid var(--border); text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tbody td { padding: 0.7rem 0.85rem; border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    .text-muted { color: var(--muted); }
    .text-sm    { font-size: 0.85rem; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 0.5rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .page-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>

{% if g.user %}
<nav>
  <div class="nav-brand">CS419<span>Project</span></div>
  <div class="nav-right">
    <span class="nav-user">{{ g.user.username }}</span>
    <form action="/logout" method="POST" style="margin:0">
      <button type="submit" class="btn btn-ghost btn-sm">Sign out</button>
    </form>
  </div>
</nav>
{% endif %}

{% block body %}{% endblock %}

</body>
</html>
